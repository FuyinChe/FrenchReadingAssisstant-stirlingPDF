# Manual Windows portable ZIP build + optional GitHub Release.
# Trigger: Actions → "Release Windows Portable" → Run workflow
name: Release Windows Portable

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Git tag (e.g. v0.5.0). Required when creating a GitHub Release."
        required: false
        type: string
      create_github_release:
        description: "Create GitHub Release and attach the zip"
        required: true
        type: boolean
        default: true
      draft_release:
        description: "Create release as draft (review before publishing)"
        required: true
        type: boolean
        default: true
      skip_desktop:
        description: "Skip Stirling Tauri build (engine-only smoke test)"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-windows-portable
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FRENCH_READER_ENABLED: "true"
  VITE_FRENCH_READER_ENABLED: "true"
  VITE_FRENCH_READER_API_URL: http://127.0.0.1:5002/french-reader
  FRENCH_READER_SKIP_ENGINE_INSTALL: "true"

jobs:
  build-windows-portable:
    name: Build portable zip (Windows)
    runs-on: windows-latest
    timeout-minutes: 180

    steps:
      - name: Validate release inputs
        shell: pwsh
        run: |
          if ('${{ inputs.create_github_release }}' -eq 'true' -and '${{ inputs.release_tag }}' -eq '') {
            throw "release_tag is required when create_github_release is true (e.g. v0.5.0)"
          }
          if ('${{ inputs.release_tag }}' -ne '' -and '${{ inputs.release_tag }}' -notmatch '^v[0-9]+\.[0-9]+\.[0-9]+') {
            Write-Warning "release_tag should look like v0.5.0"
          }

      - name: Checkout (with Stirling submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13.8"
          enable-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Chocolatey tools (Task, Tesseract)
        shell: pwsh
        run: |
          choco install go-task tesseract -y --no-progress
          "C:\ProgramData\chocolatey\bin" >> $env:GITHUB_PATH

      - name: Locate Tesseract OCR
        shell: pwsh
        run: |
          $candidates = @(
            "C:\Program Files\Tesseract-OCR",
            "C:\ProgramData\chocolatey\lib\tesseract\tools"
          )
          $tess = $candidates | Where-Object { Test-Path (Join-Path $_ "tesseract.exe") } | Select-Object -First 1
          if (-not $tess) {
            throw "tesseract.exe not found. Checked: $($candidates -join ', ')"
          }
          $tessExe = Join-Path $tess "tesseract.exe"
          "TESSDATA_PREFIX=$tess\tessdata" >> $env:GITHUB_ENV
          "TESSERACT_HOME=$tess" >> $env:GITHUB_ENV
          $tess >> $env:GITHUB_PATH
          Write-Host "Using Tesseract at $tess"
          # GITHUB_PATH applies from the *next* step — use full path here.
          & $tessExe --version
          & $tessExe --list-langs

      - name: Verify build toolchain
        shell: pwsh
        run: |
          python --version
          node --version
          java -version
          cargo --version
          task --version
          uv --version
          tesseract --version

      - name: Sync plugin version metadata
        run: python scripts/sync-plugin-version.py --platform windows-x64

      - name: Install extensions into Stirling
        shell: bash
        run: |
          chmod +x scripts/*.sh
          ./scripts/install-extensions.sh

      - name: Install Stirling build dependencies
        if: ${{ !inputs.skip_desktop }}
        working-directory: stirling-upstream
        shell: pwsh
        run: task install

      - name: Build Windows portable zip
        shell: pwsh
        run: |
          $args = @()
          if ('${{ inputs.skip_desktop }}' -eq 'true') { $args += '-SkipDesktop' }
          & "${{ github.workspace }}/scripts/build-portable-windows.ps1" @args

      - name: List build output
        shell: pwsh
        run: Get-ChildItem -Recurse dist/portable-windows | Format-Table FullName, Length

      - name: Upload portable zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-${{ inputs.release_tag || 'snapshot' }}
          path: dist/portable-windows/*.zip
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: inputs.create_github_release && inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: French Reading Assistant ${{ inputs.release_tag }} (Windows portable)
          draft: ${{ inputs.draft_release }}
          prerelease: true
          generate_release_notes: true
          files: dist/portable-windows/*.zip
          body: |
            ## Windows portable (解压即用)

            1. Download `French-Reading-Assistant-*-windows-x64.zip`
            2. Extract the archive
            3. Double-click **`Start French Reading Assistant.bat`**

            See [windows-portable-packaging.md](https://github.com/${{ github.repository }}/blob/main/docs/deployment/windows-portable-packaging.md).

            **Powered by [Stirling PDF](https://github.com/Stirling-Tools/Stirling-PDF)**
